<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Aameer Holidays</title>
    <style>
        :root {
            --cream: #f0e7d4;
            --saffron: #f4c542;
            --deep: #272727;
            --mist: #b6c8c8;
            --pine: #2a9d8f;
            --snow: #ffffff;
            --gold: #f49f0b;
            --ruby: #e63946;
        }
        body {
            background-color: var(--cream);
            color: var(--deep);
        }
        header {
            background-color: var(--saffron);
        }
        footer {
            background-color: var(--gold);
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Al Aameer Holidays</h1>
    </header>
    <main>
        <h2>Your Adventure Awaits!</h2>
    </main>
    <footer>
        <p>&copy; 2026 Al Aameer Holidays</p>
    </footer>
</body>
</html>
